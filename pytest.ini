# pytest configuration for DataRex UAT
[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v 
    --tb=short 
    --strict-markers
    --disable-warnings

# Markers
markers =
    slow: Tests that take longer to run
    api: API tests (Supabase)
    frontend: Frontend tests (Playwright)
    smoke: Quick smoke tests
    regression: Full regression tests
    order: Tests that must run in order

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(message)s

# Timeout (in seconds)
timeout = 300