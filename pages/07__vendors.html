<div id="page-vendors" class="page-shell">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  
  <div class="page-header">
    <h1>Vendors</h1>
    <p>Manage third-party data processors and DPAs.</p>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-icon stat-icon-primary">
        <i class="fa-solid fa-building"></i>
      </div>
      <div class="stat-content">
        <div class="stat-label">Total Vendors</div>
        <div class="stat-value" id="vendor-total-count">0</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon stat-icon-success">
        <i class="fa-solid fa-file-signature"></i>
      </div>
      <div class="stat-content">
        <div class="stat-label">With DPA</div>
        <div class="stat-value" id="vendor-dpa-count">0</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon stat-icon-warning">
        <i class="fa-solid fa-clock"></i>
      </div>
      <div class="stat-content">
        <div class="stat-label">Pending DPA</div>
        <div class="stat-value" id="vendor-pending-count">0</div>
      </div>
    </div>
  </div>

  <div class="page-toolbar">
    <div class="search-box">
      <i class="fa-solid fa-search"></i>
      <input type="text" id="vendors-search" placeholder="Search vendors…" oninput="renderVendors(state.vendors)">
    </div>
    <button class="btn btn-primary" onclick="resetVendorForm(); openModal('modal-vendor')">
      <i class="fa-solid fa-plus"></i> Add Vendor
    </button>
  </div>

  <div id="vendors-tbody"></div>
</div>

<style>
  .data-table-header { grid-template-columns: 1.5fr 1fr 1fr 1fr auto; }
  .data-table-row { grid-template-columns: 1.5fr 1fr 1fr 1fr auto; }
  .vendor-name { font-weight: 500; color: var(--text); }
  .vendor-email { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .badge-yes { background: var(--success-light); color: var(--success); }
  .badge-no { background: var(--danger-light); color: var(--danger); }
  .badge-pending { background: var(--warning-light); color: var(--warning); }
</style>
