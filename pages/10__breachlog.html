<div id="page-breachlog" class="page-shell">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  
  <div class="page-header">
    <h1>Breach Log</h1>
    <p>Record and track data breaches for compliance reporting. PDPA requires reporting within 72 hours.</p>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-icon stat-icon-danger">
        <i class="fa-solid fa-exclamation-triangle"></i>
      </div>
      <div class="stat-content">
        <div class="stat-label">Total Breaches</div>
        <div class="stat-value" id="breach-total-count">0</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon stat-icon-warning">
        <i class="fa-solid fa-clock"></i>
      </div>
      <div class="stat-content">
        <div class="stat-label">Pending Review</div>
        <div class="stat-value" id="breach-pending-count">0</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon stat-icon-success">
        <i class="fa-solid fa-check-circle"></i>
      </div>
      <div class="stat-content">
        <div class="stat-label">Resolved</div>
        <div class="stat-value" id="breach-resolved-count">0</div>
      </div>
    </div>
  </div>

  <div class="page-toolbar">
    <div class="search-box">
      <i class="fa-solid fa-search"></i>
      <input type="text" id="breachlog-search" placeholder="Search breaches…" oninput="renderBreachLog(state.breachLog)">
    </div>
    <button class="btn btn-primary" onclick="resetBreachForm(); openModal('modal-breach')">
      <i class="fa-solid fa-plus"></i> Record Breach
    </button>
  </div>

  <div id="breachlog-body"></div>
</div>

<style>
  .data-table-header { grid-template-columns: 1fr 1fr 1fr 1fr auto; }
  .data-table-row { grid-template-columns: 1fr 1fr 1fr 1fr auto; }
  .badge-reported { background: var(--danger-light); color: var(--danger); }
  .badge-investigation { background: var(--warning-light); color: var(--warning); }
  .badge-resolved { background: var(--success-light); color: var(--success); }
</style>
