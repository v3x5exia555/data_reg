<div id="page-companies" class="page-shell access-page">
  <div class="data-register-header">
    <div class="page-header">
      <div class="page-title">Companies</div>
      <div class="page-sub">Manage your organizations and their PDPA compliance.</div>
    </div>
    <button class="btn admin-only ml-auto" onclick="openModal('modal-company')">+ Add company</button>
  </div>

  <!-- Summary stats -->
  <div class="co-summary" id="companies-summary"></div>

  <!-- Search bar -->
  <div class="co-toolbar">
    <div class="co-search-wrap">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input
        type="text"
        id="companies-search"
        class="co-search-input"
        placeholder="Search companies…"
        oninput="renderCompanies()"
      >
    </div>
  </div>

  <div class="page-content-centered">
    <div id="companies-body-wrap"></div>
  </div>
