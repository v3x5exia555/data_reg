<div id="page-dpiapage" class="page-shell">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  
  <div class="page-header">
    <h1>DPIA — High-Risk Processing</h1>
    <p>Quick assessment for any project that uses sensitive data, monitors people, or processes data at scale.</p>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-icon stat-icon-danger">
        <i class="fa-solid fa-exclamation-circle"></i>
      </div>
      <div class="stat-content">
        <div class="stat-label">High Risk</div>
        <div class="stat-value" id="dpia-high-count">0</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon stat-icon-warning">
        <i class="fa-solid fa-exclamation-triangle"></i>
      </div>
      <div class="stat-content">
        <div class="stat-label">Medium Risk</div>
        <div class="stat-value" id="dpia-medium-count">0</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon stat-icon-success">
        <i class="fa-solid fa-check-circle"></i>
      </div>
      <div class="stat-content">
        <div class="stat-label">Low Risk</div>
        <div class="stat-value" id="dpia-low-count">0</div>
      </div>
    </div>
  </div>

  <div class="page-toolbar">
    <div class="search-box">
      <i class="fa-solid fa-search"></i>
      <input type="text" id="dpiapage-search" placeholder="Search DPIAs…" oninput="renderDPIA(state.dpiaAssessments)">
    </div>
    <button class="btn btn-primary" onclick="openModal('modal-dpia')">
      <i class="fa-solid fa-plus"></i> New DPIA
    </button>
  </div>

  <div id="dpiapage-body">
    <div class="empty-state">
      <i class="fa-solid fa-clipboard-check"></i>
      <h3>No DPIAs yet</h3>
      <p>Run a DPIA before any new high-risk activity.</p>
    </div>
  </div>
</div>

<style>
  .dpia-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    padding: 20px;
    margin-bottom: 16px;
  }
  .dpia-card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 12px;
  }
  .dpia-title { font-size: 16px; font-weight: 600; color: var(--text); }
  .dpia-meta { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
  .badge-high { background: var(--danger-light); color: var(--danger); }
  .badge-medium { background: var(--warning-light); color: var(--warning); }
  .badge-low { background: var(--success-light); color: var(--success); }
  .dpia-metrics { display: flex; gap: 12px; padding-top: 16px; border-top: 1px solid var(--border-light); }
</style>
