<div id="page-access" class="page-shell access-page">
  <div class="page-top-bar">
    <div class="page-header mb-0">
      <div class="page-title">Access control</div>
      <div class="page-sub">Manage user roles and navigation permissions.</div>
    </div>
    <div class="access-top-actions">
      <label class="access-company-switcher" id="access-company-field">
        <span>Company</span>
        <select id="access-company-select" onchange="switchAccessCompany(this.value)">
          <option value="">Loading companies...</option>
        </select>
      </label>
      <div class="seat-chip">
        Seats: <span id="seat-current">–</span> / <span id="seat-limit">–</span>
        <button id="btn-edit-seats" onclick="editSeatLimit()" title="Update seat limit"
          style="margin-left:6px;background:none;border:none;cursor:pointer;color:inherit;font-size:13px;opacity:0.7;padding:0 2px;display:none;">✏️</button>
      </div>
      <button id="btn-add-user" class="btn-primary" type="button">+ Add user</button>
    </div>
  </div>

  <!-- Team Members Section -->
  <div class="access-section">
    <div class="access-section-title">👥 Team Members</div>
    <p class="access-section-desc">Add and manage team members who can access this portal.</p>
    <div id="access-body"></div>
    <button class="btn btn-primary mt-16" type="button" onclick="updateModalPermissions(); openModal('modal-person')">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <line x1="12" y1="5" x2="12" y2="19" />
        <line x1="5" y1="12" x2="19" y2="12" />
      </svg>
      Add Team Member
    </button>
  </div>

  <!-- Navigation Permissions Section -->
  <div class="access-section">
    <div class="access-section-title">⚙️ Navigation Permissions</div>
    <p class="access-section-desc">Control which menu items each role can access.</p>

    <div class="role-selector">
      <div class="role-select-wrap">
        <span class="role-select-label">Role:</span>
        <select id="nav-role-select" class="form-input w-180" onchange="loadNavPermissions()">
          <option value="Accountadmin">Accountadmin</option>
          <option value="security_user">Security User</option>
          <option value="useradmin">Useradmin</option>
          <option value="user">User</option>
        </select>
      </div>
      <button class="btn btn-outline" onclick="openAddRoleModal()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <line x1="12" y1="5" x2="12" y2="19" />
          <line x1="5" y1="12" x2="19" y2="12" />
        </svg>
        Add Role
      </button>
    </div>

    <div id="nav-permissions-matrix"></div>
    <button class="btn btn-primary mt-20" onclick="saveNavConfig(event)">
      💾 Save Permissions
    </button>
  </div>
</div>
