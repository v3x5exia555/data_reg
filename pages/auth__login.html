<div id="screen-login" class="screen">
  <div class="auth-bg">
    <a class="auth-logo logo" href="#" onclick="goTo('screen-landing');return false;">
      <div class="logo-icon">D</div><span class="logo-name">DataRex</span>
    </a>

    <div class="auth-card">
      <div class="auth-header">
        <h2 class="auth-title">Welcome back</h2>
        <p class="auth-sub">Log in to manage your compliance</p>
      </div>

      <div class="form-group">
        <label>Work Email</label>
        <div class="input-wrap">
          <span class="input-icon"><i class="fa-solid fa-envelope"></i></span>
          <input type="email" id="login-email" class="form-input" placeholder="name@company.com" value="accountadmin@datarex.com">
        </div>
        <div class="error-msg" id="login-email-error">
          <i class="fa-solid fa-circle-exclamation"></i> Please enter a valid email
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <span class="input-icon"><i class="fa-solid fa-lock"></i></span>
          <input type="password" id="login-password" class="form-input" placeholder="Enter your password" value="AccountAdmin123!">
          <button class="pw-toggle" onclick="togglePassword('login-password', this)" type="button">
            <i class="fa-solid fa-eye"></i>
          </button>
        </div>
        <div class="error-msg" id="login-password-error">
          <i class="fa-solid fa-circle-exclamation"></i> Min 4 characters required
        </div>
      </div>

      <button class="btn btn-primary btn-full" id="login-btn" onclick="doLogin()">
        <span class="btn-text">Sign in</span>
        <i class="fa-solid fa-arrow-right"></i>
      </button>

      <div class="divider"><span>or continue with</span></div>

      <button class="btn btn-outline btn-full btn-sso">
        <img src="https://www.google.com/favicon.ico" width="16" height="16" alt="">
        Sign in with Google
      </button>

      <div class="auth-footer">
        Don't have an account? <a href="#" onclick="goTo('screen-register');return false;">Create Account</a>
      </div>

      <div class="demo-section">
        <div class="demo-divider">
          <span>Want to explore first?</span>
        </div>
        <button class="btn btn-demo" id="demo-btn" onclick="demoLogin()">
          <i class="fa-solid fa-shield-halved"></i>
          Try Demo Account
        </button>
        <div class="demo-credentials">
          <span class="demo-label">DEFAULT LOGIN</span>
          <div class="demo-cred-row">
            <span>Email:</span>
            <code>accountadmin@datarex.com</code>
          </div>
          <div class="demo-cred-row">
            <span>Password:</span>
            <code>AccountAdmin123!</code>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<style>
  /* Auth Header */
  .auth-header {
    text-align: center;
    margin-bottom: 24px;
  }
  
  /* Input with Icon */
  .input-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-light);
    font-size: 14px;
    display: flex;
    align-items: center;
  }
  
  .form-input {
    padding-left: 42px !important;
  }
  
  /* Error Messages */
  .error-msg {
    display: none;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--danger);
    margin-top: 6px;
    padding: 8px 12px;
    background: var(--danger-light);
    border-radius: var(--radius-md);
    border: 1px solid var(--danger);
  }
  
  .error-msg.visible {
    display: flex;
  }
  
  .error-msg i {
    flex-shrink: 0;
  }
  
  /* Password Toggle */
  .pw-toggle {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-light);
    padding: 4px;
    display: flex;
    align-items: center;
  }
  
  .pw-toggle:hover {
    color: var(--text);
  }
  
  /* Primary Button Full Width */
  .btn-primary {
    background: var(--primary);
    color: white;
    border: none;
  }
  
  .btn-primary:hover {
    background: var(--primary-dark);
  }
  
  .btn-full {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 14px 20px;
    border-radius: var(--radius-lg);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  
  .btn-outline {
    background: var(--bg-card);
    color: var(--text);
    border: 1px solid var(--border);
  }
  
  .btn-outline:hover {
    background: var(--bg-hover);
    border-color: var(--text-light);
  }
  
  /* SSO Button */
  .btn-sso {
    gap: 10px;
  }
  
  /* Auth Footer */
  .auth-footer {
    text-align: center;
    margin-top: 20px;
    font-size: 14px;
    color: var(--text-muted);
  }
  
  .auth-footer a {
    color: var(--primary);
    font-weight: 600;
    margin-left: 4px;
  }
  
  .auth-footer a:hover {
    text-decoration: underline;
  }
  
  /* Demo Section */
  .demo-section {
    margin-top: 24px;
    padding-top: 24px;
    border-top: 1px solid var(--border-light);
  }
  
  .demo-divider {
    display: flex;
    align-items: center;
    margin-bottom: 16px;
  }
  
  .demo-divider::before,
  .demo-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border-light);
  }
  
  .demo-divider span {
    padding: 0 16px;
    font-size: 12px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  
  .btn-demo {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 14px 20px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s;
  }
  
  .btn-demo:hover {
    background: var(--primary-light);
    border-color: var(--primary);
    color: var(--primary);
  }
  
  .btn-demo i {
    font-size: 16px;
  }
  
  /* Demo Credentials */
  .demo-credentials {
    margin-top: 16px;
    padding: 16px;
    background: var(--bg);
    border-radius: var(--radius-lg);
    border: 1px solid var(--border-light);
  }
  
  .demo-label {
    display: block;
    font-size: 10px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 12px;
  }
  
  .demo-cred-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  
  .demo-cred-row:last-child {
    margin-bottom: 0;
  }
  
  .demo-cred-row code {
    font-family: var(--mono);
    font-size: 11px;
    background: var(--bg-card);
    padding: 2px 8px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    color: var(--text);
  }
</style>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
