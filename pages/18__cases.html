<div id="page-cases" class="page-shell">
  <div class="data-register-header">
    <div class="page-header">
      <div class="page-title">Cases</div>
      <div class="page-sub">Manage compliance cases and investigations.</div>
    </div>
    <button class="btn btn-primary ml-auto" onclick="resetCaseForm(); openModal('modal-case')">+ Create case</button>
  </div>

  <div class="co-summary" id="cases-summary"></div>

  <div class="co-toolbar">
    <div class="co-search-wrap">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="cases-search" class="co-search-input" placeholder="Search cases…" oninput="renderCases(state.cases)">
    </div>
  </div>

  <div id="cases-body"></div>
</div>
