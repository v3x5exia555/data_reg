<div id="page-documents" class="page-shell">
  <div class="data-register-header">
    <div class="page-header">
      <div class="page-title">Documents</div>
      <div class="page-sub">Secure storage for your privacy policies, DPAs, and compliance records.</div>
    </div>
  </div>

  <!-- Upload Section -->
  <div class="co-summary" style="display:block; padding: 24px;">
    <div style="font-size:14px; font-weight:700; color:var(--text); margin-bottom:16px;">Upload new document</div>
    <div style="display:flex; gap:16px; flex-wrap:wrap; align-items:flex-end;">
      <div style="flex:1; min-width:200px;">
        <label style="font-size:12px; color:var(--muted); display:block; margin-bottom:6px; font-weight:600;">Category</label>
        <select class="form-input" id="doc-category">
          <option value="Privacy Policy">Privacy Policy</option>
          <option value="Consent Form">Consent Form</option>
          <option value="Data Processing Agreement">DPA</option>
          <option value="Security Policy">Security Policy</option>
          <option value="Internal Policy">Internal Policy</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div style="flex:2; min-width:250px;">
        <label style="font-size:12px; color:var(--muted); display:block; margin-bottom:6px; font-weight:600;">File</label>
        <div style="position:relative;">
          <input type="text" id="file-name-display" readonly placeholder="No file chosen" 
                 style="width:100%; padding:10px 14px; font-size:13px; border:1.5px solid var(--border); border-radius:var(--radius-md); background:white;">
          <input type="file" id="file-input" style="position:absolute; top:0; left:0; width:100%; height:100%; opacity:0; cursor:pointer;" onchange="updateFileName(this)">
        </div>
      </div>
      <button class="btn btn-primary" onclick="handleFileUpload()" style="height:42px;">Upload</button>
    </div>
  </div>

  <div class="co-toolbar" style="margin-top:24px;">
    <div class="co-search-wrap">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="doc-search" class="co-search-input" placeholder="Search documents…" oninput="renderDocuments()">
    </div>
    <select class="form-input" id="doc-filter" onchange="renderDocuments()" style="width:auto; max-width:200px;">
      <option value="">All Categories</option>
      <option value="Privacy Policy">Privacy Policy</option>
      <option value="Consent Form">Consent Form</option>
      <option value="Data Processing Agreement">DPA</option>
      <option value="Security Policy">Security Policy</option>
      <option value="Internal Policy">Internal Policy</option>
      <option value="Other">Other</option>
    </select>
    <span style="font-size:13px; color:var(--muted); font-weight:500; margin-left:auto;" id="doc-count">0 documents</span>
  </div>

  <div id="documents-list"></div>
</div>
